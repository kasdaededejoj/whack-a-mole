<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--text:#fff;--muted:#555;--fraktur:'UnifrakturMaguntia',serif}
html,body{width:100%;background:var(--bg);color:var(--text);font-family:monospace;overflow-x:hidden}

/* ── SCREENS ── */
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
.screen.active{display:flex}

/* ── WELCOME ── */
#welcome-screen{gap:2.4rem}
.welcome-msg{font-family:var(--fraktur);font-size:clamp(44px,10vw,76px);letter-spacing:-.04em;text-align:center;line-height:.65;opacity:0;animation:fadeUp .9s ease forwards .3s}
.welcome-sub{font-family:var(--fraktur);font-size:13px;letter-spacing:-.04em;color:var(--muted);opacity:0;animation:fadeUp .9s ease forwards .8s}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── GAME SCREEN ── */
#game-screen{display:none;position:fixed;inset:0;flex-direction:column;background:var(--bg);padding:1.2rem 1.4rem 1rem}
#game-screen.active{display:flex}
.hud{display:flex;justify-content:center;align-items:flex-end;gap:3rem;margin-bottom:.8rem;flex-shrink:0}
.stat{display:flex;flex-direction:column;align-items:center}
.stat span:first-child{font-family:var(--fraktur);font-size:11px;letter-spacing:-.04em;color:var(--muted);margin-bottom:2px}
.stat span:last-child{font-family:var(--fraktur);font-size:28px;font-weight:400;letter-spacing:-.08em}
.stat.large span:last-child{font-size:38px}
.bar-wrap{height:2px;background:#1a1a1a;overflow:hidden;margin-bottom:.8rem;flex-shrink:0}
.bar{height:100%;background:var(--text);transition:width .1s linear}
.field{position:relative;width:100%;flex:1;min-height:0;overflow:hidden}
.msg{font-family:var(--fraktur);font-size:13px;letter-spacing:-.04em;color:var(--muted);min-height:18px;text-align:center;padding:.6rem 0;flex-shrink:0}

/* ── MOLE ── */
.mole-el{position:absolute;width:80px;height:80px;transform:translate(-50%,-50%) scale(0);cursor:pointer;display:flex;align-items:center;justify-content:center}
.mole-el img{width:100%;height:100%;object-fit:contain;pointer-events:none;border-radius:50%}
.pts{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-family:var(--fraktur);font-size:13px;color:var(--text);white-space:nowrap;opacity:0;transition:opacity .15s,top .4s}
.pts.show{opacity:1;top:-34px}

/* ── ROUND TRANSITION ── */
#round-overlay{display:none;position:fixed;inset:0;background:#000;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:1rem}
#round-overlay.show{display:flex}
.round-text{font-family:var(--fraktur);font-size:clamp(28px,6vw,52px);letter-spacing:-.04em;opacity:0;animation:glitchIn .6s ease forwards}
@keyframes glitchIn{
  0%{opacity:0;transform:skewX(20deg) scale(1.1);filter:brightness(3)}
  20%{opacity:1;transform:skewX(-8deg) scale(0.98);filter:brightness(1.5)}
  40%{transform:skewX(4deg);filter:brightness(2)}
  60%{transform:skewX(-2deg);filter:brightness(1)}
  100%{opacity:1;transform:skewX(0) scale(1);filter:none}
}

/* ── BUTTONS ── */
.btn{font-family:var(--fraktur);font-size:16px;letter-spacing:-.04em;padding:10px 32px;border:1px solid #fff;background:transparent;color:#fff;cursor:pointer;border-radius:2px;transition:background .15s,color .15s}
.btn:hover{background:rgba(255,255,255,0.1)}
.btn.primary{background:#fff;color:#000;border-color:#fff}
.btn.primary:hover{background:#ddd;color:#000}

/* ── PORTAL / QR ── */
#portal-screen{display:none;position:fixed;inset:0;background:#000;z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:1.4rem}
#portal-screen.active{display:flex}
.portal-qr{opacity:0;animation:portalReveal .8s ease forwards}
.portal-qr img{width:200px;height:200px;image-rendering:pixelated;border:1px solid rgba(255,255,255,0.15)}
.portal-label{font-family:var(--fraktur);font-size:13px;letter-spacing:-.04em;color:var(--muted);opacity:0;animation:fadeUp .6s ease forwards .6s}
.portal-timer{font-family:var(--fraktur);font-size:11px;letter-spacing:-.04em;color:#333}
@keyframes portalReveal{
  0%{opacity:0;transform:scale(0.1) rotate(15deg);filter:brightness(8) saturate(0)}
  30%{opacity:1;transform:scale(1.08) rotate(-3deg);filter:brightness(3)}
  60%{transform:scale(0.97) rotate(1deg);filter:brightness(1.5)}
  100%{opacity:1;transform:scale(1) rotate(0);filter:none}
}

/* ── GLITCH TRANSITION (game → portal) ── */
#glitch-transition{display:none;position:fixed;inset:0;z-index:190;pointer-events:none}
#glitch-transition.active{display:block}
.gt-slice{position:absolute;left:0;right:0;background:#000;mix-blend-mode:normal}
</style>
</head>
<body>

<!-- WELCOME -->
<div class="screen active" id="welcome-screen">
  <div class="welcome-msg">hello, welcome.<br>shall we?</div>
  <div class="welcome-sub">— ——— —</div>
  <button class="btn primary" id="ok-btn">okay</button>
</div>

<!-- GAME -->
<div id="game-screen">
  <div class="hud">
    <div class="stat"><span>misses</span><span id="misses">0</span></div>
    <div class="stat large"><span>score</span><span id="score">0</span></div>
    <div class="stat"><span>combo</span><span id="combo">×1</span></div>
  </div>
  <div class="bar-wrap"><div class="bar" id="bar" style="width:100%"></div></div>
  <div class="field" id="field"></div>
  <div class="msg" id="msg"></div>
</div>

<!-- ROUND TRANSITION OVERLAY -->
<div id="round-overlay">
  <div class="round-text" id="round-text"></div>
</div>

<!-- GLITCH TRANSITION -->
<div id="glitch-transition"></div>

<!-- PORTAL / QR -->
<div id="portal-screen">
  <div class="portal-qr" id="portal-qr">
    <img src="https://i.imgur.com/uaa8sAh.png" alt="QR">
  </div>
  <div class="portal-label">scan to continue</div>
  <div class="portal-timer" id="portal-timer"></div>
</div>

<script>
const MOLE_IMAGES=[
  'https://i.imgur.com/zSllGVG.png',
  'https://i.imgur.com/LWvL8eE.png',
  'https://i.imgur.com/Vhm1AdX.png',
  'https://i.imgur.com/lwUiMZn.png'
];

// 3-part series — pacing hidden from user
// Round 0: Easy (slow), Round 1: Normal, Round 2: Semi-hard (slow spawn, more moles)
const ROUNDS=[
  {speed:1400, max:3, dur:30000, threshold:1249},
  {speed:900,  max:4, dur:30000, threshold:949},
  {speed:1100, max:5, dur:30000, threshold:649}, // semi-hard: slower than normal but more moles
];
const ROUND_FAIL=[
  'how odd. there should be more effort.',
  'weird, there\'s a crack across.',
  'it\'s very close to breaking apart.'
];

let currentRound=0;
let roundScore=0; // score for current round
let totalScore=0; // cumulative
let misses=0,combo=1,running=false;
let moles=[],gTimer=null,bTimer=null,timeLeft=0;
let bgmStarted=false;

const BGM_URL='https://raw.githubusercontent.com/kasdaededejoj/whack-a-mole/main/the%20citadel%20observes.mp3';
const THUD_URL='https://raw.githubusercontent.com/kasdaededejoj/whack-a-mole/main/thud%20sfx%2C%201st%20iteration.mp3';

const bgmAudio=new Audio(BGM_URL);
bgmAudio.loop=true;bgmAudio.volume=0.5;

let thudBuffer=null,thudReversedBuffer=null;
function reverseBuffer(ctx, buffer){
  const reversed=ctx.createBuffer(buffer.numberOfChannels,buffer.length,buffer.sampleRate);
  for(let ch=0;ch<buffer.numberOfChannels;ch++){
    const fwd=buffer.getChannelData(ch);
    const rev=reversed.getChannelData(ch);
    for(let i=0;i<buffer.length;i++) rev[i]=fwd[buffer.length-1-i];
  }
  return reversed;
}
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function preloadThud(){
  try{const ctx=getAudio();fetch(THUD_URL).then(r=>r.arrayBuffer()).then(ab=>ctx.decodeAudioData(ab)).then(buf=>{thudBuffer=buf;thudReversedBuffer=reverseBuffer(ctx,buf);}).catch(e=>{});}catch(e){}
}
function playThud(pitch=1){
  try{if(thudBuffer){const ctx=getAudio();const src=ctx.createBufferSource();src.buffer=thudBuffer;src.playbackRate.value=pitch;const g=ctx.createGain();g.gain.value=0.9;src.connect(g);g.connect(ctx.destination);src.start();}}catch(e){}
}
function playMiss(){
  try{if(thudReversedBuffer){const ctx=getAudio();const src=ctx.createBufferSource();src.buffer=thudReversedBuffer;src.playbackRate.value=1;const g=ctx.createGain();g.gain.value=0.1;src.connect(g);g.connect(ctx.destination);src.start();}}catch(e){}
}
preloadThud();

// DOM refs
const field=document.getElementById('field');
const scoreEl=document.getElementById('score');
const missEl=document.getElementById('misses');
const comboEl=document.getElementById('combo');
const msgEl=document.getElementById('msg');
const barEl=document.getElementById('bar');
const roundOverlay=document.getElementById('round-overlay');
const roundText=document.getElementById('round-text');
const gameScreen=document.getElementById('game-screen');
const welcomeScreen=document.getElementById('welcome-screen');
const portalScreen=document.getElementById('portal-screen');
const portalTimer=document.getElementById('portal-timer');
const glitchTrans=document.getElementById('glitch-transition');
const portalQR=document.getElementById('portal-qr');

// BGM on first interaction — 6s fade in
document.addEventListener('click',function initBGM(){
  if(bgmStarted)return;bgmStarted=true;
  try{
    getAudio().resume();
    bgmAudio.volume=0;
    bgmAudio.play().catch(e=>{});
    const fadeSteps=60, fadeTarget=0.5, fadeDuration=6000;
    const stepTime=fadeDuration/fadeSteps;
    const stepSize=fadeTarget/fadeSteps;
    let step=0;
    const fadeInterval=setInterval(()=>{
      step++;
      bgmAudio.volume=Math.min(fadeTarget, step*stepSize);
      if(step>=fadeSteps) clearInterval(fadeInterval);
    },stepTime);
  }catch(e){}
},{once:true});

// Welcome → start series
document.getElementById('ok-btn').addEventListener('click',()=>{
  welcomeScreen.classList.remove('active');
  startRound(0);
});

function randPos(){
  const pad=10;
  return{x:pad+Math.random()*(100-pad*2),y:pad+Math.random()*(100-pad*2)};
}

// ── SONIDO APPEAR: rapid BW flicker then snap in ──
function sonidoAppear(el){
  el.style.transition='none';
  el.style.transform='translate(-50%,-50%) scale(0)';
  el.style.opacity='0';
  let f=0;
  const flickers=[
    // rapid BW flash frames — Bleach sonido feel
    ()=>{el.style.transform='translate(-50%,-50%) scale(1.2)';el.style.opacity='1';el.style.filter='saturate(0) brightness(4) invert(1)';},
    ()=>{el.style.transform='translate(-50%,-50%) scale(0.3)';el.style.opacity='0';el.style.filter='none';},
    ()=>{el.style.transform='translate(-54%,-48%) scale(1.1)';el.style.opacity='1';el.style.filter='saturate(0) brightness(3)';},
    ()=>{el.style.transform='translate(-46%,-52%) scale(0.2)';el.style.opacity='0';el.style.filter='none';},
    ()=>{el.style.transform='translate(-50%,-50%) scale(1.05)';el.style.opacity='1';el.style.filter='saturate(0) contrast(4) brightness(2)';},
    ()=>{el.style.transform='translate(-50%,-50%) scale(0.9)';el.style.opacity='0.5';el.style.filter='saturate(0) brightness(2)';},
    ()=>{el.style.transform='translate(-50%,-50%) scale(1)';el.style.opacity='1';el.style.filter='none';}, // snap in
  ];
  function next(){
    if(f>=flickers.length)return;
    flickers[f]();f++;
    if(f<flickers.length) setTimeout(next, f<5?18:0);
  }
  requestAnimationFrame(()=>requestAnimationFrame(next));
}

// ── GLITCH DISSOLVE DISAPPEAR ──
function cssGlitch(el){
  el.style.transition='none';
  let f=0;
  const frames=[
    ()=>{el.style.transform='translate(-50%,-50%) scale(1) skewX(10deg)';el.style.opacity='0.9';el.style.filter='saturate(0) brightness(4) invert(1)';},
    ()=>{el.style.transform='translate(-44%,-50%) scale(1.08) skewX(-14deg)';el.style.opacity='0.8';el.style.filter='saturate(0) brightness(3)';},
    ()=>{el.style.transform='translate(-56%,-50%) scale(0.92) skewX(8deg)';el.style.opacity='0.6';el.style.filter='invert(1) brightness(2)';},
    ()=>{el.style.transform='translate(-48%,-54%) scale(1.1) skewY(5deg)';el.style.opacity='0.45';el.style.filter='saturate(0) brightness(5)';},
    ()=>{el.style.transform='translate(-52%,-46%) scale(0.85) skewX(12deg)';el.style.opacity='0.25';el.style.filter='invert(1) brightness(3)';},
    ()=>{el.style.transform='translate(-50%,-50%) scale(0.5)';el.style.opacity='0.1';el.style.filter='saturate(0)';},
    ()=>{el.style.transform='translate(-50%,-50%) scale(0)';el.style.opacity='0';},
  ];
  function next(){
    if(f>=frames.length){el.remove();return;}
    frames[f]();f++;
    setTimeout(next,20+Math.random()*15);
  }
  next();
}

function spawnMole(){
  if(!running)return;
  const round=ROUNDS[currentRound];
  if(moles.filter(m=>m.alive).length>=round.max)return;
  const pos=randPos();
  const el=document.createElement('div');
  el.className='mole-el';
  el.style.left=pos.x+'%';el.style.top=pos.y+'%';
  const imgSrc=MOLE_IMAGES[Math.floor(Math.random()*MOLE_IMAGES.length)];
  const img=document.createElement('img');img.src=imgSrc;img.alt='';
  const pts=document.createElement('span');pts.className='pts';
  el.appendChild(img);el.appendChild(pts);
  field.appendChild(el);
  const mole={el,alive:true,timer:null};
  moles.push(mole);
  sonidoAppear(el);
  el.addEventListener('click',()=>whack(mole,pts));
  mole.timer=setTimeout(()=>{
    if(mole.alive){
      mole.alive=false;
      el.classList.remove('up');
      misses++;combo=1;
      missEl.textContent=misses;comboEl.textContent='×1';
      try{playMiss();}catch(e){}
      setTimeout(()=>el.remove(),220);
    }
  },round.speed);
}

function whack(mole,ptsEl){
  if(!running||!mole.alive)return;
  clearTimeout(mole.timer);
  mole.alive=false;
  cssGlitch(mole.el);
  const pitchMult=0.9+Math.min(combo,8)*0.04;
  try{playThud(pitchMult);}catch(e){}
  combo=Math.min(combo+1,8);
  const pts=10*combo;roundScore+=pts;totalScore+=pts;
  scoreEl.textContent=roundScore;comboEl.textContent='×'+combo;
  ptsEl.textContent='+'+pts;ptsEl.classList.add('show');
  msgEl.textContent=combo>=5?'unstoppable':combo>=3?'combo ×'+combo:'';
}

function spawnLoop(){
  if(!running)return;
  spawnMole();
  const round=ROUNDS[currentRound];
  gTimer=setTimeout(spawnLoop,round.speed*0.45+Math.random()*round.speed*0.4);
}

function startRound(idx){
  currentRound=idx;
  roundScore=0;misses=0;combo=1;running=true;
  const round=ROUNDS[idx];
  timeLeft=round.dur;
  gameScreen.classList.add('active');
  scoreEl.textContent='0';missEl.textContent='0';comboEl.textContent='×1';
  msgEl.textContent='';
  barEl.style.width='100%';
  field.innerHTML='';moles=[];
  spawnLoop();
  const t0=Date.now();
  bTimer=setInterval(()=>{
    timeLeft=round.dur-(Date.now()-t0);
    barEl.style.width=Math.max(0,(timeLeft/round.dur)*100)+'%';
    if(timeLeft<=0){clearInterval(bTimer);endRound();}
  },50);
}

function endRound(){
  running=false;
  clearTimeout(gTimer);clearInterval(bTimer);
  moles.forEach(m=>{if(m.alive){clearTimeout(m.timer);m.el.remove();}});
  moles=[];
  barEl.style.width='0%';

  const round=ROUNDS[currentRound];
  const passed=roundScore>=round.threshold;
  const isLast=currentRound===ROUNDS.length-1;

  if(!passed){
    // Failed threshold — cryptic message, terminal. Player must refresh to retry.
    msgEl.textContent=ROUND_FAIL[currentRound];
    totalScore=0;
    return;
  }

  if(isLast){
    // All 3 rounds cleared — portal transition
    msgEl.textContent='';
    setTimeout(()=>glitchToPortal(),600);
    return;
  }

  // Next round
  const next=currentRound+1;
  const labels=['—','——','———'];
  showRoundTransition(labels[next],()=>startRound(next));
}

function showRoundTransition(label, cb){
  roundText.textContent=label;
  roundText.style.animation='none';
  roundOverlay.classList.add('show');
  void roundText.offsetWidth;
  roundText.style.animation='glitchIn .6s ease forwards';
  setTimeout(()=>{
    roundOverlay.classList.remove('show');
    cb();
  },1800);
}

// ── GLITCH-TO-PORTAL TRANSITION ──
function glitchToPortal(){
  const gt=glitchTrans;
  gt.innerHTML='';
  gt.classList.add('active');

  const sliceCount=18;
  const slices=[];
  for(let i=0;i<sliceCount;i++){
    const s=document.createElement('div');
    s.className='gt-slice';
    const h=100/sliceCount;
    s.style.top=(i*h)+'%';
    s.style.height=h+'%';
    s.style.background=Math.random()>0.5?'#fff':'#000';
    s.style.opacity='0';
    gt.appendChild(s);
    slices.push(s);
  }

  // Phase 1: rapid slice flicker
  let frame=0;
  const totalFrames=22;
  function flicker(){
    if(frame>=totalFrames){
      // Phase 2: wipe to black then show portal
      slices.forEach(s=>{s.style.background='#000';s.style.opacity='1';});
      setTimeout(()=>{
        gt.classList.remove('active');
        gt.innerHTML='';
        gameScreen.classList.remove('active');
        showPortal();
      },200);
      return;
    }
    slices.forEach(s=>{
      s.style.opacity=Math.random()>0.4?'1':'0';
      s.style.background=Math.random()>0.5?'#fff':'#000';
      s.style.transform=`translateX(${(Math.random()-0.5)*30}px)`;
    });
    frame++;
    setTimeout(flicker,35+Math.random()*20);
  }
  flicker();
}

function showPortal(){
  portalScreen.classList.add('active');
  // Reset and re-trigger animation
  portalQR.style.animation='none';
  void portalQR.offsetWidth;
  portalQR.style.animation='portalReveal .8s ease forwards';

  let t=8;
  portalTimer.textContent='';
  setTimeout(()=>{
    const cd=setInterval(()=>{
      portalTimer.textContent='fades in '+t+'s';
      t--;
      if(t<0){
        clearInterval(cd);
        // Jump-out exit
        portalQR.style.animation='none';
        portalQR.style.transition='transform .4s cubic-bezier(.55,.06,.68,.19), opacity .4s';
        portalQR.style.transform='scale(0.2) translateY(-80px)';
        portalQR.style.opacity='0';
        setTimeout(()=>{
          portalScreen.classList.remove('active');
          portalQR.style.transform='';portalQR.style.opacity='';portalQR.style.transition='';
          // Reset for replay
          currentRound=0;totalScore=0;
          welcomeScreen.classList.add('active');
        },450);
      }
    },1000);
  },1000);
}
</script>
</body>
</html>
