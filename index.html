<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the realm</title>
<style>
@font-face{font-family:"BlackChancery";src:url("BLKCHCRY.TTF") format("truetype");font-display:block;font-weight:normal;font-style:normal;}
@font-face{font-family:"Thestral";src:url("ThestralNeue-Bold.otf") format("opentype");font-display:block;font-weight:normal;font-style:normal;}
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--text:#fff;--muted:#555;--fraktur:'BlackChancery',serif;--thestral:'Thestral',serif;--num:'Coolvetica',ui-sans-serif,system-ui,sans-serif}
html,body{width:100%;background:var(--bg);color:var(--text);font-family:monospace;overflow-x:hidden}

#score,#combo,#misses,.duel-hp-num,#duel-player-hp,#duel-enemy-hp,#nuka-keycap-inner,.portal-timer,.dev-audio-val{font-family:var(--num);font-variant-numeric:tabular-nums;font-feature-settings:'tnum';}

/* ── SCREENS ── */
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
.screen.active{display:flex}

/* ── WELCOME FIGURE ── */
#welcome-figure-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:1;overflow:hidden}
.welcome-figure{width:auto;height:72vh;max-height:600px;opacity:0.06;filter:grayscale(1) brightness(10) invert(0)}

/* ── WELCOME ── */
#welcome-screen{overflow:hidden}
#welcome-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.4rem;position:relative;z-index:2}
.welcome-msg{font-family:var(--fraktur);font-size:clamp(44px,10vw,76px);letter-spacing:-.04em;text-align:center;line-height:.65;animation:fadeDown .9s ease both .3s}
.welcome-sub{font-family:var(--fraktur);font-size:13px;letter-spacing:-.04em;color:var(--muted);animation:fadeUp .9s ease both .8s}
#ok-btn{animation:btnFadeUp .9s ease both .3s;transition:clip-path 80ms cubic-bezier(.4,0,.2,1),background 80ms ease,color 80ms ease,border-color 80ms ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes btnFadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── GAME SCREEN ── */
#game-screen{display:none;position:fixed;inset:0;flex-direction:column;background:var(--bg);padding:1.2rem 1.4rem 1rem}
#game-screen::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle at 50% 8%, rgba(255,255,255,0.035), transparent 24%);background-size:100% 100%;opacity:0.04;}
#game-screen.active{display:flex}
.hud{display:flex;flex-direction:column;align-items:center;gap:.65rem;width:min(600px,100%);margin:0 auto .9rem;flex-shrink:0;padding:0 0 .3rem;border-bottom:1px solid rgba(255,255,255,0.08);opacity:0.6;transform:translateY(-2px);transition:opacity .3s ease,transform .2s ease}
.hud.active-opacity{opacity:1;transform:translateY(0)}
.stat{display:flex;flex-direction:column;align-items:center;text-align:center;width:100%;min-width:auto}
.stat span:first-child{font-family:var(--fraktur);font-size:10px;letter-spacing:.24em;color:rgba(255,255,255,0.42);margin-bottom:4px;text-transform:uppercase}
.stat span:last-child{font-family:var(--num);font-size:clamp(24px,4.2vw,32px);font-weight:400;letter-spacing:-.08em;line-height:1;display:inline-block;transition:opacity .12s ease,transform .15s ease,color .15s ease}
#score.fade-value,#combo.fade-value,#misses.fade-value{opacity:.35}
#combo.combo-pulse{transform:scale(1.06)}
#misses.miss-pulse{color:rgba(255,140,140,0.96)}
.stat.large{min-width:100%;max-width:320px}
.stat.large span:last-child{font-size:clamp(30px,5.4vw,40px)}
.bar-wrap{height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.02),rgba(255,255,255,0.12),rgba(255,255,255,0.02));overflow:hidden;margin-bottom:.7rem;flex-shrink:0;box-shadow:0 0 0 1px rgba(255,255,255,0.01) inset}
.bar{height:100%;background:var(--text);transition:width .1s linear}
.field{position:relative;width:100%;flex:1;min-height:0;overflow:hidden}
.msg{font-family:var(--fraktur);font-size:13px;letter-spacing:-.04em;color:rgba(255,255,255,0.36);min-height:18px;text-align:center;padding:.58rem 0 .35rem;flex-shrink:0;opacity:.96}

/* ── MOLE ── */
.mole-el{position:absolute;width:80px;height:80px;transform:translate(-50%,-50%) scale(0);cursor:pointer;display:flex;align-items:center;justify-content:center}
/* glyph targets — † and ⌀ as text */
.mole-glyph{font-size:42px;line-height:1;color:#fff;pointer-events:none;user-select:none;display:block}
.mole-el.purpality .mole-glyph{font-size:22px;color:rgba(180,100,255,0.9)}
/* purpality SVG img */
.mole-el.purpality{width:40px;height:40px}
.mole-el.purpality img, .mole-el.purpality svg{width:100%;height:100%;object-fit:contain;object-position:center;pointer-events:none;transform:scale(1.12)}
.mole-el.purpality::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1.5px solid rgba(160,80,255,0.85);box-shadow:0 0 6px 1px rgba(140,60,240,0.5),inset 0 0 4px rgba(140,60,240,0.2);pointer-events:none}
/* noise target — chromatic aberration shimmer on the glyph */
@keyframes chromaShimmer{
  0%{filter:saturate(0) brightness(1.4) hue-rotate(0deg)}
  20%{filter:saturate(2) brightness(1.8) hue-rotate(90deg) contrast(1.5)}
  40%{filter:saturate(0) brightness(0.9) hue-rotate(200deg)}
  60%{filter:saturate(3) brightness(2) hue-rotate(300deg) contrast(2)}
  80%{filter:saturate(1) brightness(1.5) hue-rotate(160deg)}
  100%{filter:saturate(0) brightness(1.4) hue-rotate(0deg)}
}
.mole-el.noise img{animation:chromaShimmer .35s linear infinite}
.pts{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-family:var(--fraktur);font-size:13px;color:var(--text);white-space:nowrap;opacity:0;transition:opacity .15s,top .4s}
.pts.show{opacity:1;top:-34px}

/* ── WAVE PROGRESS BAR ── */
.wave-progress{display:flex;gap:3px;height:2px;margin-bottom:.8rem;flex-shrink:0}
.wave-seg{flex:1;height:100%;background:#1a1a1a;transition:background .4s ease}
#nuka-keycap{display:none;position:fixed;left:0;top:0;transform:translate(-50%,-50%);z-index:75;pointer-events:none}
#nuka-keycap.active{display:block}
#nuka-keycap-inner{width:64px;height:64px;border:0.75px solid rgba(255,255,255,0.14);background:rgba(12,12,12,0.92);display:flex;align-items:center;justify-content:center;font-family:var(--num);font-size:30px;font-weight:700;letter-spacing:0.04em;line-height:1;padding-top:0.09em;color:#ececec;border-radius:10px;box-shadow:0 8px 22px rgba(0,0,0,0.35), inset 0 -1px 0 rgba(255,255,255,0.08);text-transform:uppercase}
#nuka-keycap-inner.success{border-color:rgba(120,170,118,0.65);color:#cfe5c6}
#nuka-keycap-inner.fail{border-color:rgba(170,90,90,0.75);color:#f3c4c4}
#nuka-cooldown{display:none;position:fixed;left:0;top:0;transform:translate(-50%,0);width:64px;height:3px;border-radius:999px;overflow:hidden;background:rgba(142,56,56,0.16);z-index:74;pointer-events:none;opacity:1;transition:opacity .2s ease}
#nuka-cooldown.active{display:block;opacity:1}
#nuka-cooldown:not(.active){opacity:0}
#nuka-cooldown.fail{background:rgba(100,40,40,0.22)}
#nuka-cooldown-bar{height:100%;width:100%;background:rgba(175,75,75,0.88);transform-origin:left center;will-change:transform}
#nuka-cooldown.fail #nuka-cooldown-bar{background:rgba(130,55,55,0.82)}
.wave-seg.done-0{background:#c8b84a}
.wave-seg.done-1{background:#a07a50}
.wave-seg.done-2{background:#7a5060}
.wave-seg.done-3{background:#5a3078}
.wave-seg.done-4{background:#3a1860}
.wave-seg.done-5{background:#2a1050}
#round-overlay{display:none;position:fixed;inset:0;background:#000;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:1rem}
#round-overlay.show{display:flex}
.round-text{font-family:var(--fraktur);font-size:clamp(28px,6vw,52px);letter-spacing:-.04em;opacity:0;animation:glitchIn .6s ease forwards}
@keyframes glitchIn{
  0%{opacity:0;transform:skewX(20deg) scale(1.1);filter:brightness(3)}
  20%{opacity:1;transform:skewX(-8deg) scale(0.98);filter:brightness(1.5)}
  40%{transform:skewX(4deg);filter:brightness(2)}
  60%{transform:skewX(-2deg);filter:brightness(1)}
  100%{opacity:1;transform:skewX(0) scale(1);filter:none}
}

/* ── BUTTONS ── */
.btn{font-family:var(--fraktur);font-size:16px;letter-spacing:-.04em;padding:10px 32px;border:1px solid #fff;background:transparent;color:#fff;cursor:pointer;border-radius:2px;transition:background .15s,color .15s,opacity .1s ease,transform .1s ease}
.btn:hover{background:rgba(255,255,255,0.1);transform:translateY(-1px);opacity:.94}
.btn:active{transform:translateY(0);opacity:.86}
.btn.primary{background:#fff;color:#000;border-color:#fff}
.btn.primary:hover{background:#ddd;color:#000}

/* ── PORTAL / QR ── */
#portal-screen{display:none;position:fixed;inset:0;background:#000;z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:1.4rem}
#portal-screen.active{display:flex}
.portal-qr{opacity:0;animation:portalReveal .8s ease forwards}
.portal-qr img{width:200px;height:200px;image-rendering:pixelated;border:1px solid rgba(255,255,255,0.15)}
.portal-label{font-family:var(--fraktur);font-size:13px;letter-spacing:-.04em;color:var(--muted);opacity:0;animation:fadeUp .6s ease forwards .6s}
.portal-timer{font-family:var(--fraktur);font-size:11px;letter-spacing:-.04em;color:#333}
@keyframes portalReveal{
  0%{opacity:0;transform:scale(0.1) rotate(15deg);filter:brightness(8) saturate(0)}
  30%{opacity:1;transform:scale(1.08) rotate(-3deg);filter:brightness(3)}
  60%{transform:scale(0.97) rotate(1deg);filter:brightness(1.5)}
  100%{opacity:1;transform:scale(1) rotate(0);filter:none}
}

/* ── GLITCH TRANSITION (game → portal) ── */
#glitch-transition{display:none;position:fixed;inset:0;z-index:190;pointer-events:none}
#glitch-transition.active{display:block}
.gt-slice{position:absolute;left:0;right:0;background:#000;mix-blend-mode:normal}

/* ── DEV PANEL ── */
#dev-panel{
  display:none;
  position:fixed;
  inset:0;
  z-index:9999;
  background:rgba(0,0,0,0.96);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:1.4rem;
  border:1px solid #1a1a1a;
}
#dev-panel.open{display:flex}
#dev-live-overlay{
  display:none;
  position:fixed;
  top:10px;
  left:10px;
  z-index:9998;
  background:rgba(0,0,0,0.75);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:6px;
  padding:8px 11px;
  font-family:monospace;
  font-size:11px;
  line-height:1.5;
  color:#9ee79e;
  white-space:pre;
  pointer-events:none;
}
#dev-live-overlay.active{display:block}
#dev-panel-inner{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.2rem;
  border:1px solid #222;
  padding:2.4rem 3rem;
  min-width:280px;
}
#dev-panel-title{
  font-family:var(--fraktur);
  font-size:13px;
  letter-spacing:.12em;
  color:#333;
  text-transform:uppercase;
}
#dev-pw-input{
  font-family:monospace;
  font-size:14px;
  background:#000;
  border:1px solid #333;
  color:#fff;
  padding:8px 14px;
  width:100%;
  text-align:center;
  letter-spacing:.2em;
  outline:none;
}
#dev-pw-input:focus{border-color:#555}
#dev-pw-error{
  font-family:var(--fraktur);
  font-size:11px;
  color:#4a0000;
  letter-spacing:-.04em;
  min-height:14px;
}
#dev-controls{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:.8rem;
  width:100%;
}
#dev-controls.unlocked{display:flex}
.dev-btn{
  font-family:var(--fraktur);
  font-size:14px;
  letter-spacing:-.04em;
  padding:8px 0;
  border:1px solid #333;
  background:transparent;
  color:#888;
  cursor:pointer;
  width:100%;
  transition:border-color .15s,color .15s;
}
.dev-btn:hover{border-color:#fff;color:#fff}
.dev-btn.active-round{border-color:#555;color:#ccc}
#dev-close{
  font-family:var(--fraktur);
  font-size:11px;
  letter-spacing:.06em;
  color:#222;
  cursor:pointer;
  transition:color .15s;
  background:none;
  border:none;
  margin-top:.4rem;
}
#dev-close:hover{color:#555}


/* ── DEV AUDIO CONTROLS ── */
#dev-audio{display:flex;flex-direction:column;gap:.6rem;width:100%;border-top:1px solid #1a1a1a;padding-top:.8rem;margin-top:.2rem;}
.dev-audio-row{display:flex;align-items:center;justify-content:space-between;gap:.8rem;}
.dev-audio-label{font-family:var(--fraktur);font-size:11px;letter-spacing:.06em;color:#333;min-width:60px;}
.dev-slider{-webkit-appearance:none;appearance:none;width:100%;height:1px;background:#222;outline:none;cursor:pointer;}
.dev-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:10px;height:10px;background:#555;cursor:pointer;border-radius:50%;}
.dev-slider::-webkit-slider-thumb:hover{background:#fff;}
.dev-slider::-moz-range-thumb{width:10px;height:10px;background:#555;cursor:pointer;border-radius:50%;border:none;}
.dev-audio-val{font-family:monospace;font-size:10px;color:#333;min-width:28px;text-align:right;}
.dev-toggle-row{display:flex;align-items:center;justify-content:space-between;}
.dev-toggle{font-family:var(--fraktur);font-size:11px;letter-spacing:.04em;padding:4px 10px;border:1px solid #222;background:transparent;color:#444;cursor:pointer;transition:border-color .12s,color .12s;}
.dev-toggle:hover{border-color:#555;color:#888;}
.dev-toggle.on{border-color:#555;color:#aaa;}


/* ── FAIL OVERLAY ── */
#fail-overlay{display:none;position:fixed;inset:0;z-index:100;background:#000;align-items:center;justify-content:center;}
#fail-overlay.active{display:flex;}
.fail-msg{font-family:var(--thestral);font-size:clamp(16px,3.5vw,26px);letter-spacing:-.04em;color:var(--muted);text-align:center;opacity:0;animation:fadeUp .8s ease both .2s;}

/* ── DUEL SCREEN ── */
#duel-screen{display:none;position:fixed;inset:0;flex-direction:column;background:var(--bg);z-index:10}
#duel-screen.active{display:flex}
.duel-top{display:flex;justify-content:space-between;align-items:flex-start;padding:1.6rem 2rem 0;flex-shrink:0}
.duel-fighter{display:flex;flex-direction:column;gap:.4rem;width:38%}
.duel-fighter.right{align-items:flex-end}
.duel-name{font-family:var(--fraktur);font-size:11px;letter-spacing:.1em;color:var(--muted)}
.duel-hp-wrap{height:2px;background:#1a1a1a;overflow:hidden;width:100%}
.duel-hp-bar{height:100%;background:var(--text);transition:width .3s ease}
.duel-hp-num{font-family:var(--num);font-size:22px;letter-spacing:-.06em}
.duel-arena{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.duel-canvas-wrap{position:relative;width:100%;height:100%}
#duel-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.duel-bottom{flex-shrink:0;padding:1rem 2rem 1.6rem;display:flex;flex-direction:column;align-items:center;gap:.8rem}
.duel-msg{font-family:var(--fraktur);font-size:12px;letter-spacing:-.04em;color:var(--muted);min-height:16px;text-align:center}
.duel-actions{display:flex;gap:1rem}
.duel-action-btn{
  font-family:var(--fraktur);font-size:15px;letter-spacing:-.04em;
  padding:10px 28px;border:1px solid #333;background:transparent;color:#555;
  cursor:pointer;transition:border-color .12s,color .12s;
  position:relative;overflow:hidden;
}
.duel-action-btn:hover:not(:disabled){border-color:#888;color:#ccc}
.duel-action-btn.selected{border-color:#fff;color:#fff}
.duel-action-btn:disabled{opacity:.25;cursor:default}
.duel-phase-label{font-family:var(--fraktur);font-size:10px;letter-spacing:.14em;color:#222;text-transform:uppercase}

</style>
</head>

  </div>
  <div id="welcome-inner">
    <div class="welcome-msg">welcome.<br>care for a charade?</div>
    <div class="welcome-sub">— ——— —</div>
    <button class="btn primary" id="ok-btn">begin.</button>
  </div>
</div>

<!-- GAME -->
<div id="game-screen">
  <div class="hud">
    <div class="stat"><span>misses</span><span id="misses">0</span></div>
    <div class="stat large"><span>score</span><span id="score">0</span></div>
    <div class="stat"><span>combo</span><span id="combo">×1</span></div>
  </div>
  <div class="bar-wrap"><div class="bar" id="bar" style="width:100%"></div></div>
  <div class="wave-progress" id="wave-progress" style="display:none">
    <div class="wave-seg" id="wseg-0"></div>
    <div class="wave-seg" id="wseg-1"></div>
    <div class="wave-seg" id="wseg-2"></div>
    <div class="wave-seg" id="wseg-3"></div>
    <div class="wave-seg" id="wseg-4"></div>
    <div class="wave-seg" id="wseg-5"></div>
  </div>
  <!-- UPGRADE MODAL -->
  <div id="upgrade-modal" style="display:none;position:fixed;inset:0;z-index:80;background:rgba(0,0,0,0.92);align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;padding:1.4rem 1.6rem">
    <div style="font-family:var(--fraktur);font-size:11px;letter-spacing:.12em;color:#333;text-transform:uppercase">augment</div>
    <div style="display:flex;gap:0.8rem;flex-wrap:wrap;justify-content:center;align-items:center">
      <button class="btn" id="upgrade-rapidfire" style="display:none;min-width:8.6rem;padding:0.72rem 1rem">rapid fire</button>
      <button class="btn" id="upgrade-aoe" style="display:none;min-width:8.6rem;padding:0.72rem 1rem">aoe missile</button>
      <button class="btn" id="upgrade-doublemissile" style="display:none;min-width:8.6rem;padding:0.72rem 1rem">double missile</button>
      <button class="btn" id="upgrade-homing" style="display:none;min-width:8.6rem;padding:0.72rem 1rem">rapid + homing</button>
      <button class="btn" id="upgrade-nuka" style="min-width:8.6rem;padding:0.72rem 1rem">nuka.</button>
      <button class="btn" id="upgrade-machina" style="min-width:8.6rem;padding:0.72rem 1rem">machina.</button>
    </div>
    <div style="font-family:var(--fraktur);font-size:11px;letter-spacing:-.04em;color:#333;text-align:center;max-width:340px;line-height:1.4;opacity:0.9" id="upgrade-desc">—</div>
  </div>
  <div id="nuka-keycap"><div id="nuka-keycap-inner"></div></div>
  <div id="nuka-cooldown"><div id="nuka-cooldown-bar"></div></div>
  <div class="field" id="field"></div>
  <div class="msg" id="msg"></div>
</div>


<!-- DUEL SCREEN -->
<div id="duel-screen">
  <div class="duel-top">
    <div class="duel-fighter left">
      <div class="duel-name">you</div>
      <div class="duel-hp-wrap"><div class="duel-hp-bar" id="duel-player-bar" style="width:100%"></div></div>
      <div class="duel-hp-num" id="duel-player-hp">5</div>
    </div>
    <div class="duel-fighter right">
      <div class="duel-name" style="font-family:var(--thestral)">the void</div>
      <div class="duel-hp-wrap"><div class="duel-hp-bar" id="duel-enemy-bar" style="width:100%"></div></div>
      <div class="duel-hp-num" id="duel-enemy-hp">16</div>
    </div>
  </div>
  <div class="duel-arena">
    <div class="duel-canvas-wrap">
      <canvas id="duel-canvas"></canvas>
    </div>
  </div>
  <div class="duel-bottom">
    <div class="duel-phase-label" id="duel-phase">choose</div>
    <div class="duel-actions">
      <button class="duel-action-btn" id="duel-btn-strike">strike</button>
      <button class="duel-action-btn" id="duel-btn-guard">guard</button>
      <button class="duel-action-btn" id="duel-btn-void">void</button>
    </div>
    <div class="duel-msg" id="duel-msg"></div>
  </div>
</div>

<!-- FAIL OVERLAY -->
<div id="fail-overlay">
  <div class="fail-msg" id="fail-msg-text"></div>
</div>

<!-- ROUND TRANSITION OVERLAY -->
<div id="round-overlay">
  <div class="round-text" id="round-text"></div>
</div>

<!-- GLITCH TRANSITION -->
<div id="glitch-transition"></div>

<!-- PORTAL / QR -->
<div id="portal-screen">
  <div class="portal-qr" id="portal-qr">
    <img src="https://i.imgur.com/uaa8sAh.png" alt="QR">
  </div>
  <div class="portal-label">scan to continue</div>
  <div class="portal-timer" id="portal-timer"></div>
</div>

<!-- DEV PANEL -->
<div id="dev-panel">
  <div id="dev-panel-inner">
    <div id="dev-panel-title">dev access</div>
    <input id="dev-pw-input" type="password" maxlength="12" placeholder="——————" autocomplete="off" spellcheck="false"/>
    <div id="dev-pw-error"></div>
    <button class="dev-btn" id="dev-pw-submit" style="width:100%;margin-top:.2rem;color:#555;border-color:#222;">enter</button>
    <div id="dev-controls">
      <button class="dev-btn" id="dev-r0">round i — mole (easy)</button>
      <button class="dev-btn" id="dev-r1">round ii — void invaders</button>
      <button class="dev-btn" id="dev-r2">round iii — the void</button>
      <button class="dev-btn" id="dev-portal">→ portal direct</button>
    </div>
    <div id="dev-audio">
      <div class="dev-audio-row">
        <span class="dev-audio-label">bgm vol</span>
        <input class="dev-slider" type="range" id="dev-bgm-vol" min="0" max="100" value="50" step="1">
        <span class="dev-audio-val" id="dev-bgm-vol-val">50</span>
      </div>
      <div class="dev-audio-row">
        <span class="dev-audio-label">sfx vol</span>
        <input class="dev-slider" type="range" id="dev-sfx-vol" min="0" max="100" value="80" step="1">
        <span class="dev-audio-val" id="dev-sfx-vol-val">80</span>
      </div>
      <div class="dev-toggle-row">
        <span class="dev-audio-label">bgm</span>
        <button class="dev-toggle on" id="dev-bgm-toggle">on</button>
      </div>
      <div class="dev-toggle-row">
        <span class="dev-audio-label">sfx</span>
        <button class="dev-toggle on" id="dev-sfx-toggle">on</button>
      </div>
      <div class="dev-toggle-row">
        <span class="dev-audio-label">bgm restart</span>
        <button class="dev-toggle" id="dev-bgm-restart">↺</button>
      </div>
      <div class="dev-toggle-row">
        <span class="dev-audio-label">live overlay</span>
        <button class="dev-toggle" id="dev-live-toggle">off</button>
      </div>
    </div>
    <button id="dev-close">dismiss</button>
  </div>
</div>

<div id="dev-live-overlay"></div>

<script type="module">
import { initGame } from './js/game.js';

// Initialize game on page load
document.addEventListener('DOMContentLoaded', () => {
  initGame();
});
</script>
</body>
</html>
